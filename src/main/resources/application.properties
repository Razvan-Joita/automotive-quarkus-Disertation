quarkus.application.name=automotive-quarkus

quarkus.http.host=0.0.0.0
quarkus.http.port=${WEBSITES_PORT:8080}

quarkus.hibernate-orm.enabled=false
quarkus.flyway.enabled=false

quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

mp.openapi.info.title=Automotive Quarkus API
mp.openapi.info.version=1.0.0
mp.openapi.info.description=Automotive Management System built with Quarkus

quarkus.smallrye-health.root-path=/q/health
quarkus.micrometer.export.prometheus.enabled=true

quarkus.http.auth.permission.public.paths=/,/test,/q/health,/q/health/*,/q/metrics,/q/openapi,/q/swagger-ui,/q/swagger-ui/*
quarkus.http.auth.permission.public.policy=permit

quarkus.http.auth.permission.api.paths=/api/*
quarkus.http.auth.permission.api.policy=authenticated

quarkus.package.jar.type=fast-jar