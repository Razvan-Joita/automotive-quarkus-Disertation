services:
  mysql:
    image: mysql:8.0
    container_name: automotive-quarkus-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: automotive_quarkus_db
      MYSQL_USER: automotive
      MYSQL_PASSWORD: Jabulani2002@
    ports:
      - "3308:3306"
    volumes:
      - mysql_quarkus_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      timeout: 20s
      retries: 10
    networks:
      - automotive_quarkus_network

  app-quarkus:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile
    container_name: automotive-quarkus-app
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:mysql://automotive-quarkus-mysql:3306/automotive_quarkus_db
      QUARKUS_DATASOURCE_USERNAME: automotive
      QUARKUS_DATASOURCE_PASSWORD: Jabulani2002@
      QUARKUS_FLYWAY_MIGRATE_AT_START: "true"
    networks:
      - automotive_quarkus_network

  prometheus:
    image: prom/prometheus:latest
    container_name: automotive-quarkus-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_quarkus_data:/prometheus
    ports:
      - "9091:9090"
    depends_on:
      - app-quarkus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - automotive_quarkus_network

  grafana:
    image: grafana/grafana:latest
    container_name: automotive-quarkus-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    volumes:
      - grafana_quarkus_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - automotive_quarkus_network

volumes:
  mysql_quarkus_data:
  prometheus_quarkus_data:
  grafana_quarkus_data:

networks:
  automotive_quarkus_network:
    driver: bridge